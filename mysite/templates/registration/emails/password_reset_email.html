<div style="font-family: 'Helvetica', sans-serif; max-width: 600px; margin: auto; padding: 20px; border: 1px solid #e1e1e1; border-radius: 10px;">
    <h2 style="color: #333; text-align: center;">Reset Your Password</h2>
    <h3>Hi {{ user.username }},</h3>
    <p>We received a request to reset your password. Click the button below to proceed:</p>
    
    <div style="text-align: center; margin: 30px 0;">
        <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" 
           style="background-color: #007bff; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
           Reset Password
        </a>
    </div>
    
    <p style="color: #666; font-size: 12px;">If you didn't request this, please ignore this email.</p>
    <hr style="border: 0; border-top: 1px solid #eee;">
    <p style="font-size: 11px; color: #999;">{{ site_name }} Team</p>
</div>

</html>
