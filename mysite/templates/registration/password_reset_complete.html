{% extends 'base.html' %}

{% block title %}
  Password Change Confirm
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <div class="text-center py-4">
                        <div class="mb-3">
                            <i class="bi bi-check-circle-fill" style="font-size: 6rem; color:green"></i>
                        </div>
                        <h4 class="fw-bold">Password Reset Complete</h4>
                        <p class="text-muted quicksand-600">Your password has been reset successfully. You can now login with your new password</p>
                        <hr />
                        <div class="d-flex justify-content-center">
                            <a href="{% url 'login' %}" class="btn btn-success px-5">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
