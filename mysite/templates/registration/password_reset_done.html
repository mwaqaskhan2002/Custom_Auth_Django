{% extends "base.html" %}

{% block title %}Password Reset Done{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-4 col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <div class="text-center py-4">
                        <div class="mb-3">
                            <i class="bi bi-check-circle-fill" style="font-size: 6rem; color:green"></i>
                        </div>
                        <h4 class="fw-bold fs-3">Email Verification</h4>
                        <p class="text-muted quicksand-600">Verification Sent! Please follow the link in your email to securely update your password.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
